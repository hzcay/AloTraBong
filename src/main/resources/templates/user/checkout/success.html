<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  lang="vi"
  th:replace="~{fragments/layout :: layout(~{::content}, 'Thanh toán thành công')}"
>
  <div th:fragment="content">
    <section
      class="container"
      style="
        max-width: 720px;
        margin: 56px auto;
        text-align: center;
        color: #e5e7eb;
      "
    >
      <div
        style="
          background: #111827;
          border: 1px solid rgba(148, 163, 184, 0.25);
          border-radius: 16px;
          padding: 28px;
        "
      >
        <!-- Icon -->
        <div
          style="
            font-size: 56px;
            line-height: 1;
            margin-bottom: 12px;
            color: #22c55e;
          "
        >
          ✔
        </div>

        <!-- Heading -->
        <h2 style="margin: 6px 0 12px 0; color: #d1fae5; font-weight: 800">
          Thanh toán thành công!
        </h2>

        <!-- Info -->
        <p style="color: #94a3b8; margin-bottom: 18px">
          Đơn
          <strong th:text="${orderCode} ?: '#CODE'">#CODE</strong>
          đã được ghi nhận. Hệ thống sẽ chuyển sang lịch sử đơn hàng trong
          <span id="sec-left">2</span>s…
        </p>

        <!-- Progress -->
        <div
          style="
            height: 8px;
            border-radius: 9999px;
            background: rgba(34, 197, 94, 0.15);
            overflow: hidden;
            margin: 14px 0 20px;
          "
        >
          <div
            id="bar"
            style="
              height: 100%;
              width: 0%;
              background: #22c55e;
              transition: width 0.1s linear;
            "
          ></div>
        </div>

        <!-- Action -->
        <a
          th:href="${redirectTo} ?: @{/user/order/history}"
          style="
            display: inline-block;
            padding: 10px 16px;
            border-radius: 10px;
            background: #22c55e;
            color: #0b1220;
            font-weight: 700;
            text-decoration: none;
          "
        >
          Xem lịch sử đơn hàng
        </a>
      </div>
    </section>

    <script th:inline="javascript">
      const delay = /*[[${delayMs} ?: 2000]]*/ 2000;
      const to =
        /*[[${redirectTo} ?: '/user/order/history']]*/ "/user/order/history";

      const bar = document.getElementById("bar");
      const sec = document.getElementById("sec-left");

      const start = Date.now();
      const total = Math.max(500, delay);

      (function tick() {
        const elapsed = Date.now() - start;
        const p = Math.min(1, elapsed / total);
        if (bar) bar.style.width = (p * 100).toFixed(0) + "%";

        const remainSec = Math.ceil(Math.max(0, total - elapsed) / 1000);
        if (sec) sec.textContent = remainSec;

        if (p < 1) requestAnimationFrame(tick);
        else window.location.href = to;
      })();
    </script>
  </div>
</html>
